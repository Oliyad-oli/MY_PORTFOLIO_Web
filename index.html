<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Oliad Dandena | Software Developer Portfolio</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Oliad Dandena's personal portfolio showcasing projects, skills, and experience in web and software development."
    />

    <!-- Author -->
    <meta name="author" content="Oliad Dandena" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ol.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="Oliad Dandena | Developer Portfolio" />

      property="og:description"
      content="Explore my projects, skills, and experience as a full-stack software developer."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/ol.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oliad Dandena | Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Personal portfolio of Oliad Dandena, software developer."
    />

  </head>
